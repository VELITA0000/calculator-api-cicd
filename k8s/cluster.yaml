apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: practica-k8s
  region: us-east-1
  version: "1.31"

# Evita cambios futuros de comportamiento por defecto en eksctl
autoModeConfig:
  enabled: false

# Reutiliza rol existente del laboratorio (sin crear roles nuevos)
iam:
  serviceRoleARN: arn:aws:iam::304450075728:role/LabRole

managedNodeGroups:
  - name: workers
    instanceType: t3.medium
    minSize: 1
    maxSize: 2
    desiredCapacity: 1
    iam:
      instanceRoleARN: arn:aws:iam::304450075728:role/LabRole
